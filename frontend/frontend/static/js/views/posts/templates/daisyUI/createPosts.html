<div class="m-2 flex flex-col items-center justify-center flex flex-col">
    <div>
        <form enctype="multipart/form-data" method="post">
            <div>
                <div class="flex flex-col">
                    <h1>Post Meme or Template</h1>
                    <div>
                        <fieldset class="fieldset">
                            <legend class="fieldset-legend">Pick a file</legend>
                            <input
                                type="file"
                                class="file-input"
                                accept="video/*,image/*"
                                id="currentSelectedFile"
                            />
                            <label class="fieldset-label">Max size 30MB</label>

                            <div class="previewBox">
                                <div class="hidden">
                                    <img
                                        class="max-w-70"
                                        src="#"
                                        id="imgPreview"
                                    />
                                </div>
                                <div class="hidden">
                                    <video
                                        src="#"
                                        id="vidPreview"
                                        class="max-w-70"
                                        controls
                                    ></video>
                                </div>
                            </div>
                        </fieldset>
                    </div>
                </div>
                <div class="flex flex-col">
                    <fieldset class="fieldset">
                        <legend class="fieldset-legend">Title</legend>
                        <input
                            type="text"
                            placeholder="Type catchy text"
                            class="input"
                            id="postTitle"
                        />
                    </fieldset>
                </div>
                <div class="flex flex-col">
                    <fieldset class="fieldset">
                        <legend class="fieldset-legend">Tags</legend>
                        <textarea
                            class="textarea h-24"
                            placeholder="Tags"
                            id="postTags"
                        ></textarea>
                    </fieldset>
                </div>
                <div class="flex flex-row">
                    <h1>Visibility</h1>
                    <div class="min-w-14"></div>
                    <input
                        type="radio"
                        name="visibility"
                        checked="checked"
                        class="checkbox"
                        id="public"
                    />
                    <label for="public">Public</label>
                    <input
                        type="radio"
                        name="visibility"
                        class="checkbox"
                        id="private"
                    />
                    <label for="private">Private</label>
                </div>

                <div class="divider">OPTIONAL</div>
                <div class="collapse bg-base-100 border-base-300 border">
                    <input type="checkbox" />
                    <div class="collapse-title font-semibold">
                        Click for more options
                    </div>
                    <div class="collapse-content text-sm">
                        <div class="flex flex-col">
                            <label for="ageRating">Age Rating</label>
                            <select class="select select-lg" id="ageRating">
                                <option selected>PG13</option>
                                <option>NSFW</option>
                            </select>
                        </div>
                        <div class="flex flex-col">
                            <label for="category">Select Category</label>
                            <select class="select select lg" id="category">
                                <option disabled selected>Relatable</option>
                                <option>Politics</option>
                                <option>Casual</option>
                                <option>Programming</option>
                                <option>Troll</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <div class="flex justify-center items-center m-4">
            <button
                class="btn btn-soft btn-accent"
                type="submit"
                onclick="uploadPostOnServer()"
            >
                Post
            </button>
        </div>
    </div>
</div>
