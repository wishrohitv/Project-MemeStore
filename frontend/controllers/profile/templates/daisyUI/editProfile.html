{% extends 'base.html' %}

{% block body %}
<div class="flex flex-col justify-center items-center m-4">
    <form enctype="multipart/form-data" method="post">
        <div class="flex flex-col gap-2 p-8 sm:flex-row items-center sm:gap-6 sm:py-4 ...">
            <div class="flex flex-col justify-center items-center max-w-60">
                <img id="profilePreview"
                    class="mx-auto block h-24 sm:h-30 sm:w-30 sm:mt-8 rounded-full sm:mx-0 sm:shrink-0"
                    src="https://www.pmindia.gov.in/wp-content/uploads/2023/07/default_Thumbnails-03.jpg" alt="" />

                <div class="m-6 max-w-60 flex flex-col justify-center items-center">
                    <input id="selectedProfileImg" type="file" class="file-input" accept="image/*"
                        onchange="loadFile(event)" name="selectedProfileImg" />
                    <label for="selectedProfileImg" class="fieldset-label">Max size 2MB</label>
                    <div id="imgUploadButton" class="hidden btn" onclick="imgUploadButton()"> Upload</div>
                </div>
            </div>
            <div class="space-y-2 text-center sm:text-left">
                <div class="space-y-0.5 gap-2">
                    <input id="uName" type="text" placeholder="Your Name" class="input" />
                    <input id="userName" type="input" class="input validator" required placeholder="Username"
                        pattern="[A-Za-z][A-Za-z0-9\-]*" minlength="3" maxlength="20"
                        title="Only letters, numbers or dash" />
                    <p class="validator-hint">
                        Must be 3 to 20 characters
                        <br />containing only letters, numbers or dash
                    </p>
                    <!--                    <input id="userName" type="text" placeholder="User name id" class="input" />-->
                    <textarea id="bio" class="textarea h-18" placeholder="Bio"></textarea>
                </div>
                <div class="flex flex-row justify-center item-center gap-4">
                    <!--                    <button-->
                    <!--                        class="border-purple-200 text-white p-1 rounded-xl bg-purple-500 hover:border-transparent hover:bg-purple-600 hover:text-white active:bg-purple-700 ...">-->
                    <!--                        Follow-->
                    <!--                    </button>-->
                    <!--                    <button type="submit" class="btn">More</button>-->
                </div>
            </div>
        </div>
        <div>
            <button class="btn" type="submit"> Save changes</button>
        </div>
    </form>
    <button onclick="upload()">get data</button>
</div>
<!-- js file to perform client side work -->
<script src="{{ url_for('user.static', filename='daisyUI/js/editProfile.js') }}"></script>
{% endblock body %}
